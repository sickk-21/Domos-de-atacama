<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo - Domos Atacama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4 text-primary">Disponibilidad de Domos (MVP)</h2>
    
    <div class="row" id="contenedor-domos">
        <!-- Los domos se cargarán aquí por JavaScript -->
    </div>
</div>

<script>
    // Conexión a tu Backend Spring Boot (asegúrate de que esté corriendo en el puerto 8080)
    const API_URL = 'http://localhost:8080/api/domos';

    async function cargarDomos() {
        try {
            const respuesta = await fetch(API_URL);
            const domos = await respuesta.json();
            
            const contenedor = document.getElementById('contenedor-domos');
            contenedor.innerHTML = ''; // Limpiar cargando

            domos.forEach(domo => {
                const colorEstado = domo.estado === 'Disponible' ? 'success' : 'danger';
                
                const card = `
                    <div class="col-md-4 mb-3">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">Domo ${domo.numero}</h5>
                                <p class="card-text">Capacidad: ${domo.capacidad} personas</p>
                                <span class="badge bg-${colorEstado}">${domo.estado}</span>
                            </div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += card;
            });

        } catch (error) {
            console.error("Error conectando al backend:", error);
            document.getElementById('contenedor-domos').innerHTML = 
                '<div class="alert alert-danger">No se pudo conectar a la base de datos. ¿Está el backend encendido?</div>';
        }
    }

    // Ejecutar al cargar la página
    cargarDomos();
</script>

</body>
</html>
