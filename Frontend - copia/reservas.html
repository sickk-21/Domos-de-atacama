<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva tu Domo - Atacama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-light text-dark shadow-lg">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4 text-success">Haz tu Reserva</h2>
                    
                    <form id="form-reserva">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre Completo</label>
                            <input type="text" id="input-cliente" class="form-control" placeholder="Ej: Juan Pérez" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Cantidad de Personas</label>
                            <input type="number" id="input-personas" class="form-control" min="1" max="10" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Selecciona un Domo Disponible</label>
                            <select id="select-domo" class="form-select" required>
                                <option value="">Cargando domos...</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100 fw-bold fs-5">Confirmar Reserva</button>
                    </form>
                    
                    <div id="mensaje-exito" class="alert alert-success mt-3 d-none">
                        ¡Reserva confirmada con éxito! Te esperamos.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8090/api/domos';

    async function cargarDomosDisponibles() {
        try {
            const respuesta = await fetch(API_URL);
            const domos = await respuesta.json();
            
            const select = document.getElementById('select-domo');
            select.innerHTML = '<option value="">Elige una opción...</option>'; 


            const domosDisponibles = domos.filter(domo => domo.estado === 'Disponible');

            if (domosDisponibles.length === 0) {
                select.innerHTML = '<option value="">No hay domos disponibles en este momento</option>';
                return;
            }

            domosDisponibles.forEach(domo => {
                select.innerHTML += `<option value="${domo.id}">Domo ${domo.numero} (Capacidad max: ${domo.capacidad})</option>`;
            });

        } catch (error) {
            console.error("Error conectando al servidor:", error);
        }
    }

    document.getElementById('form-reserva').addEventListener('submit', async function(event) {
        event.preventDefault();
        const idDomo = document.getElementById('select-domo').value;
        const cliente = document.getElementById('input-cliente').value;
        const personas = document.getElementById('input-personas').value;

        try {
            const respuesta = await fetch(`${API_URL}/${idDomo}/reservar?cliente=${encodeURIComponent(cliente)}&personas=${personas}`, {
                method: 'PUT'
            });

            if (respuesta.ok) {
                document.getElementById('mensaje-exito').classList.remove('d-none');
                document.getElementById('form-reserva').reset();
                cargarDomosDisponibles(); // Recargar la lista para quitar el domo que acabamos de ocupar
            } else {
                alert("Error al procesar la reserva. Es posible que el domo ya haya sido ocupado.");
            }
        } catch (error) {
            alert("No se pudo conectar con el servidor.");
        }
    });

    cargarDomosDisponibles();
</script>
</body>
</html>
